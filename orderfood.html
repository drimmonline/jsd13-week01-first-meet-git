<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สั่งอาหาร - Masari Restaurant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Masari Restaurant</div>
      <button class="hamburger" id="hamburger" aria-label="เมนู">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="orderfood.html">Order</a></li>
        <li><a href="#contact">Contact</a></li>
        <li class="nav-cart-link"><a href="#" id="navCartLink">🛒 ตะกร้าสินค้า</a></li>
      </ul>
      <div class="cart-icon" id="cartIcon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
    </nav>

    <section class="hero" id="hero">
      <div class="hero-content">
        <h1 class="hero-title">สั่งอาหารออนไลน์</h1>
        <p class="hero-subtitle">
          เลือกเมนูที่คุณชอบ แล้วเราจะทำให้ fresh ถึงบ้านคุณ
        </p>
      </div>
    </section>

    <div class="filter-bar">
      <div class="search-container">
        <input
          type="text"
          class="search-input"
          placeholder="ค้นหาอาหาร.."
          id="searchInput"
        />
        <button type="button" id="searchBtn" class="search-button-wrapper">
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
      <div class="category-filter" id="categoryFilter"></div>
    </div>

    <div class="card-item"></div>

    <div id="pagination" class="pagination"></div>

    <footer class="footer" id="contact">
      <div class="footer-content">
        <h3>Masari Restaurant</h3>
        <p>📍 123 ถนนสุขุมวิท กรุงเทพฯ 10110</p>
        <p>📞 02-123-4567</p>
        <p>📧 info@masari.com</p>
        <p>🕐 เปิดทุกวัน 10:00 - 22:00 น.</p>
      </div>
    </footer>

    <!-- overlay ตะกร้าสินค้า -->
    <div class="cart-overlay" id="cartOverlay">
      <div class="cart-panel">
        <div class="cart-header">
          <h3>ตะกร้าสินค้า</h3>
          <button class="cart-close" id="cartClose">&times;</button>
        </div>
        <div class="cart-content" id="cartContent"></div>
      </div>
    </div>

    <!-- modal เลือก size/addon -->
    <div class="modal-overlay" id="addonModal">
      <div class="modal-panel">
        <div class="modal-header">
          <h3>เลือกตัวเลือกเพิ่มเติม</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
          <button class="modal-confirm" id="modalConfirm">ยืนยันเพิ่มลงตะกร้า</button>
        </div>
      </div>
    </div>

    <script src="myObject.js"></script>
    <script src="script.js"></script>
  </body>
</html>
